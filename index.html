<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#5c2500" />
<meta name="description" content="Rajdeep Furnitures – Receipt Manager" />
<title>Rajdeep Furnitures – Receipt Manager</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="logo.jpg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #fdf6ee;
  --surface: #fff9f3;
  --card: #ffffff;
  --brand: #8b3a00;
  --brand-deep: #5c2500;
  --brand-light: #f5e6d8;
  --accent: #c9760a;
  --accent-light: #fef0dc;
  --text: #1a0a00;
  --text-muted: #7a5a3a;
  --border: #e8d5bc;
  --success: #2d7a3a;
  --shadow: 0 2px 16px rgba(139,58,0,0.10);
  --radius: 14px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ─── HEADER ─── */
header {
  background: var(--brand-deep);
  color: #fff;
  padding: 18px 20px 14px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(92,37,0,0.25);
}

.logo-wrap {
  width: 52px; height: 52px;
  background: #fff;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}

.logo-wrap img { width: 100%; height: 100%; object-fit: contain; }

.logo-fallback {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  color: var(--brand);
  font-weight: 700;
  letter-spacing: -1px;
}

.header-text h1 {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  letter-spacing: 0.3px;
  line-height: 1.2;
}

.header-text p {
  font-size: 12px;
  opacity: 0.7;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* ─── TABS ─── */
.tabs {
  display: flex;
  background: var(--brand-deep);
  border-top: 1px solid rgba(255,255,255,0.1);
  padding: 0 16px 8px;
  gap: 4px;
}

.tab-btn {
  flex: 1;
  padding: 8px 4px;
  background: rgba(255,255,255,0.08);
  border: none;
  border-radius: 8px;
  color: rgba(255,255,255,0.6);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.2px;
}

.tab-btn.active {
  background: var(--accent);
  color: #fff;
}

/* ─── MAIN ─── */
main { padding: 20px 16px 80px; max-width: 520px; margin: 0 auto; }

.section { display: none; }
.section.active { display: block; }

/* ─── FORM ─── */
.form-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.form-section-title {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  color: var(--brand);
  margin: 20px 0 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--brand-light);
}

.form-section-title:first-child { margin-top: 0; }

.field { margin-bottom: 16px; }

label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 6px;
}

input[type=text], input[type=tel], input[type=number], input[type=date],
input[type=time], textarea, select {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: var(--text);
  background: var(--surface);
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
  appearance: none;
}

input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(201,118,10,0.12);
}

textarea { resize: vertical; min-height: 72px; }

/* Payment phase chips */
.phase-group { display: flex; gap: 8px; flex-wrap: wrap; }

.phase-chip { position: relative; }

.phase-chip input[type=checkbox] { position: absolute; opacity: 0; width: 0; height: 0; }

.phase-chip label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border: 1.5px solid var(--border);
  border-radius: 100px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: none;
  letter-spacing: 0;
  background: var(--surface);
  transition: all 0.18s;
}

.phase-chip label .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.4;
  transition: opacity 0.18s;
}

.phase-chip input:checked + label {
  border-color: var(--brand);
  background: var(--brand-light);
  color: var(--brand-deep);
  font-weight: 600;
}

.phase-chip input:checked + label .dot { opacity: 1; }

/* Payment mode */
.mode-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.mode-chip { position: relative; }

.mode-chip input[type=radio] { position: absolute; opacity: 0; width: 0; height: 0; }

.mode-chip label {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 8px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: none;
  letter-spacing: 0;
  background: var(--surface);
  transition: all 0.18s;
}

.mode-chip input:checked + label {
  border-color: var(--accent);
  background: var(--accent-light);
  color: var(--brand-deep);
  font-weight: 600;
}

.notes-block { display: none; margin-top: 12px; }
.notes-block.visible { display: block; }

/* ─── BUTTONS ─── */
.btn-primary {
  width: 100%;
  padding: 14px;
  background: var(--brand);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.3px;
  transition: background 0.2s, transform 0.1s;
  margin-top: 8px;
}

.btn-primary:active { transform: scale(0.98); }
.btn-primary:hover { background: var(--brand-deep); }

.btn-secondary {
  flex: 1;
  padding: 12px;
  background: var(--brand-light);
  color: var(--brand);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
}

.btn-wa {
  flex: 1;
  padding: 12px;
  background: #25D366;
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.18s;
}

.btn-wa:hover { background: #1da851; }

.action-row { display: flex; gap: 10px; margin-top: 16px; }

/* ─── TOAST ─── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--success);
  color: #fff;
  padding: 12px 22px;
  border-radius: 100px;
  font-size: 14px;
  font-weight: 500;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  transition: transform 0.3s;
  z-index: 999;
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* ─── RECEIPT LIST ─── */
.receipt-list { display: flex; flex-direction: column; gap: 12px; }

.receipt-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
}

.receipt-card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}

.receipt-name {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  color: var(--brand-deep);
}

.receipt-amount { font-size: 18px; font-weight: 700; color: var(--accent); }

.receipt-meta {
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}

.badge {
  display: inline-block;
  padding: 2px 9px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 600;
  background: var(--brand-light);
  color: var(--brand);
}

.badge.phase { background: var(--accent-light); color: var(--brand-deep); }

.receipt-card-actions { display: flex; gap: 8px; }

.btn-icon {
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  transition: all 0.18s;
}

.btn-icon:hover { border-color: var(--accent); color: var(--brand-deep); }

.btn-icon.wa {
  background: #e9f9f0;
  color: #25D366;
  border-color: #b7eece;
}

.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }

/* Receipt number row */
.receipt-no-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--brand-light);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin-bottom: 4px;
}

.receipt-no-row span { font-size: 13px; color: var(--text-muted); }
.receipt-no-row strong { font-size: 15px; color: var(--brand-deep); font-weight: 700; }

.auto-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-left: 6px;
  vertical-align: middle;
}

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<header>
  <div class="logo-wrap">
    <img src="logo.jpg" alt="Rajdeep Furnitures Logo" />
  </div>
  <div class="header-text">
    <h1>Rajdeep Furnitures</h1>
    <p>Receipt Manager · Alwar</p>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('new', this)">✦ New Receipt</button>
  <button class="tab-btn" onclick="switchTab('list', this)">📋 All Receipts</button>
</div>

<main>

  <!-- ─── NEW RECEIPT ─── -->
  <div id="tab-new" class="section active">
    <div class="form-card">

      <div class="receipt-no-row">
        <span>Receipt No.</span>
        <strong id="receipt-no-display">#001</strong>
      </div>

      <p class="form-section-title">Customer Details</p>

      <div class="field">
        <label>Full Name *</label>
        <input type="text" id="f-name" placeholder="e.g. Ramesh Kumar" />
      </div>

      <div class="field">
        <label>Address</label>
        <textarea id="f-address" placeholder="House No., Street, City…"></textarea>
      </div>

      <div class="field">
        <label>Mobile Number *</label>
        <input type="tel" id="f-mobile" placeholder="10-digit mobile" maxlength="10" />
      </div>

      <p class="form-section-title">Payment Details</p>

      <div class="field">
        <label>Amount (Rs.) *</label>
        <input type="number" id="f-amount" placeholder="0" min="0" />
      </div>

      <div class="field">
        <label>Payment Phase</label>
        <div class="phase-group">
          <div class="phase-chip">
            <input type="checkbox" id="ph-advance" value="Initial (Advance)" />
            <label for="ph-advance"><span class="dot"></span>Initial (Advance)</label>
          </div>
          <div class="phase-chip">
            <input type="checkbox" id="ph-work" value="Work Start" />
            <label for="ph-work"><span class="dot"></span>Work Start</label>
          </div>
          <div class="phase-chip">
            <input type="checkbox" id="ph-final" value="Final" />
            <label for="ph-final"><span class="dot"></span>Final</label>
          </div>
        </div>
      </div>

      <div class="field">
        <label>Mode of Payment *</label>
        <div class="mode-group">
          <div class="mode-chip">
            <input type="radio" name="mode" id="m-cash" value="Cash" onchange="toggleNotes()" />
            <label for="m-cash">💵 Cash</label>
          </div>
          <div class="mode-chip">
            <input type="radio" name="mode" id="m-cheque" value="Cheque" onchange="toggleNotes()" />
            <label for="m-cheque">🏦 Cheque</label>
          </div>
          <div class="mode-chip">
            <input type="radio" name="mode" id="m-upi" value="UPI" onchange="toggleNotes()" />
            <label for="m-upi">📲 UPI</label>
          </div>
          <div class="mode-chip">
            <input type="radio" name="mode" id="m-bank" value="Bank Transfer" onchange="toggleNotes()" />
            <label for="m-bank">🔁 Bank Transfer</label>
          </div>
        </div>

        <div class="notes-block" id="notes-block">
          <div class="field" style="margin-top:12px; margin-bottom:0">
            <label>Payment Notes <span style="text-transform:none;color:var(--accent)">(Cheque No. / UPI ID / Ref No.)</span></label>
            <textarea id="f-notes" placeholder="e.g. Cheque No. 004512, HDFC Bank&#10;or UPI Ref: 32891726381"></textarea>
          </div>
        </div>
      </div>

      <div class="field">
        <label>Date <span class="auto-tag">⚡ Auto-filled</span></label>
        <input type="date" id="f-date" />
      </div>

      <div class="field">
        <label>Time <span class="auto-tag">⚡ Auto-filled</span></label>
        <input type="time" id="f-time" />
      </div>

      <div class="field">
        <label>Description / Items</label>
        <textarea id="f-desc" placeholder="e.g. Modular Kitchen – Phase 1, Wardrobe supply…"></textarea>
      </div>

      <button class="btn-primary" onclick="saveReceipt()">Save & Generate Receipt</button>
    </div>
  </div>

  <!-- ─── RECEIPT LIST ─── -->
  <div id="tab-list" class="section">
    <div id="receipt-list-container" class="receipt-list">
      <div class="empty-state">
        <div class="icon">🪑</div>
        <p>No receipts yet.<br/>Create your first receipt!</p>
      </div>
    </div>
  </div>

</main>

<div class="toast" id="toast">Receipt saved!</div>

// ─── STATE ───
let receipts = JSON.parse(localStorage.getItem('rf_receipts') || '[]');
let nextNo = parseInt(localStorage.getItem('rf_next_no') || '1');

// ─── INIT ───
window.onload = () => {
  setAutoDateTime();
  updateReceiptNoDisplay();
  renderList();
};

function setAutoDateTime() {
  const now = new Date();
  document.getElementById('f-date').value = now.toISOString().split('T')[0];
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('f-time').value = `${hh}:${mm}`;
}

function updateReceiptNoDisplay() {
  document.getElementById('receipt-no-display').textContent = '#' + String(nextNo).padStart(3,'0');
}

function switchTab(tab, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'list') renderList();
}

function toggleNotes() {
  const mode = document.querySelector('input[name=mode]:checked')?.value;
  const block = document.getElementById('notes-block');
  block.classList.toggle('visible', ['Cheque','UPI','Bank Transfer'].includes(mode));
}

// ─── SAVE RECEIPT ───
function saveReceipt() {
  const name = document.getElementById('f-name').value.trim();
  const mobile = document.getElementById('f-mobile').value.trim();
  const amount = document.getElementById('f-amount').value.trim();
  const mode = document.querySelector('input[name=mode]:checked')?.value;

  if (!name || !mobile || !amount || !mode) {
    alert('Please fill in Name, Mobile, Amount and Mode of Payment.');
    return;
  }

  if (!/^\d{10}$/.test(mobile)) {
    alert('Please enter a valid 10-digit mobile number.');
    return;
  }

  const phases = [];
  ['advance','work','final'].forEach(id => {
    const el = document.getElementById('ph-' + id);
    if (el.checked) phases.push(el.value);
  });

  const receipt = {
    id: nextNo,
    no: String(nextNo).padStart(3,'0'),
    name,
    address: document.getElementById('f-address').value.trim(),
    mobile,
    amount: parseFloat(amount),
    phases,
    mode,
    notes: document.getElementById('f-notes').value.trim(),
    date: document.getElementById('f-date').value,
    time: document.getElementById('f-time').value,
    desc: document.getElementById('f-desc').value.trim(),
    createdAt: new Date().toISOString(),
  };

  receipts.unshift(receipt);
  nextNo++;
  localStorage.setItem('rf_receipts', JSON.stringify(receipts));
  localStorage.setItem('rf_next_no', nextNo);

  showToast('✅ Receipt #' + receipt.no + ' saved!');
  resetForm();
  updateReceiptNoDisplay();
  setTimeout(() => generatePDF(receipt), 400);
}

function resetForm() {
  ['f-name','f-address','f-mobile','f-amount','f-notes','f-desc'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.querySelectorAll('input[name=mode]').forEach(r => r.checked = false);
  document.querySelectorAll('.phase-chip input').forEach(c => c.checked = false);
  document.getElementById('notes-block').classList.remove('visible');
  setAutoDateTime();
}

// ─── GENERATE PDF ───
function generatePDF(receipt) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a5', orientation: 'portrait' });
  const W = 148, PL = 14, PR = 134;

  // Background
  doc.setFillColor(253, 246, 238);
  doc.rect(0, 0, W, 210, 'F');

  // White header
  doc.setFillColor(255, 255, 255);
  doc.rect(0, 0, W, 46, 'F');

  // Logo — reduced width centered
  try {
    const logoW = (W - PL - PL) * 0.875;
    const logoX = (W - logoW) / 2;
    doc.addImage(LOGO_DATA_URI, 'JPEG', logoX, 2, logoW, 26);
  } catch(e) {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(18);
    doc.setTextColor(92, 37, 0);
    doc.text('RAJDEEP FURNITURES', W / 2, 18, { align: 'center' });
  }

  // Company info below logo
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(100, 80, 60);
  doc.text('Rajdeep Furnitures · Alwar, Rajasthan', W / 2, 32, { align: 'center' });
  doc.text('Mob: +91-7727007565', W / 2, 38, { align: 'center' });

  // Divider line
  doc.setDrawColor(92, 37, 0);
  doc.setLineWidth(0.5);
  doc.line(0, 46, W, 46);

  let y = 54;

  // Date / Time
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(122, 90, 58);
  doc.text('Date: ' + formatDate(receipt.date), PL, y);
  doc.text('Time: ' + formatTime(receipt.time), PR, y, { align: 'right' });

  y += 8;
  doc.setDrawColor(232, 213, 188);
  doc.setLineWidth(0.3);
  doc.line(PL, y, PR, y);
  y += 7;

  // Customer
  sectionHeader(doc, 'CUSTOMER DETAILS', PL, y); y += 7;
  row(doc, 'Name', receipt.name, PL, y, PR); y += 7;
  if (receipt.address) {
    const addrLines = doc.splitTextToSize(receipt.address, PR - PL - 30);
    row(doc, 'Address', receipt.address, PL, y, PR, true);
    y += (addrLines.length * 5) + 2;
  }
  row(doc, 'Mobile', '+91 ' + receipt.mobile, PL, y, PR); y += 7;

  y += 2;
  doc.setDrawColor(232, 213, 188);
  doc.setLineWidth(0.3);
  doc.line(PL, y, PR, y);
  y += 7;

  // Payment
  sectionHeader(doc, 'PAYMENT DETAILS', PL, y); y += 7;
  row(doc, 'Mode', receipt.mode, PL, y, PR); y += 7;
  if (receipt.phases && receipt.phases.length > 0) {
    row(doc, 'Phase', receipt.phases.join(', '), PL, y, PR); y += 7;
  }
  if (receipt.notes) {
    const nl = doc.splitTextToSize(receipt.notes, PR - PL - 30);
    row(doc, 'Ref / Notes', receipt.notes, PL, y, PR, true);
    y += (nl.length * 5) + 2;
  }
  if (receipt.desc) {
    const dl = doc.splitTextToSize(receipt.desc, PR - PL - 30);
    row(doc, 'Description', receipt.desc, PL, y, PR, true);
    y += (dl.length * 5) + 2;
  }

  y += 4;

  // Amount box
  doc.setFillColor(92, 37, 0);
  doc.roundedRect(PL, y, PR - PL, 18, 3, 3, 'F');
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(200, 170, 140);
  doc.text('AMOUNT RECEIVED', PL + 5, y + 7);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(18);
  doc.setTextColor(255, 255, 255);
  doc.text('Rs. ' + Number(receipt.amount).toLocaleString('en-IN'), PR - 4, y + 13, { align: 'right' });

  y += 26;

  // Signature
  doc.setDrawColor(180, 150, 120);
  doc.setLineWidth(0.3);
  doc.line(PR - 38, y, PR, y);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(7);
  doc.setTextColor(122, 90, 58);
  doc.text('Authorised Signature', PR - 19, y + 4, { align: 'center' });

  // Footer
  doc.setFillColor(92, 37, 0);
  doc.rect(0, 200, W, 10, 'F');
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(7);
  doc.setTextColor(200, 170, 140);
  doc.text('Thank you for choosing Rajdeep Furnitures!', W / 2, 206, { align: 'center' });

  const filename = 'Receipt_' + receipt.no + '_' + receipt.name.replace(/\s+/g,'_') + '.pdf';
  doc.save(filename);
}

function sectionHeader(doc, text, x, y) {
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(7.5);
  doc.setTextColor(139, 58, 0);
  doc.text(text, x, y);
}

function row(doc, label, value, x, y, xr, wrap) {
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(122, 90, 58);
  doc.text(label + ':', x, y);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(26, 10, 0);
  if (wrap) {
    const lines = doc.splitTextToSize(value, xr - x - 30);
    doc.text(lines, x + 28, y);
  } else {
    doc.text(value, x + 28, y);
  }
}

function formatDate(d) {
  if (!d) return '—';
  const parts = d.split('-');
  return `${parts[2]}/${parts[1]}/${parts[0]}`;
}

function formatTime(t) {
  if (!t) return '—';
  const [h, m] = t.split(':');
  const ampm = +h >= 12 ? 'PM' : 'AM';
  const hr = +h % 12 || 12;
  return `${hr}:${m} ${ampm}`;
}

// ─── WHATSAPP ───
function shareWhatsApp(receipt) {
  const phases = receipt.phases && receipt.phases.length ? receipt.phases.join(', ') : 'Not specified';
  const notes = receipt.notes ? `\n📝 Ref: ${receipt.notes}` : '';
  const desc = receipt.desc ? `\n🛋️ Items: ${receipt.desc}` : '';

  const msg = `🪑 *RAJDEEP FURNITURES*\nAlwar, Rajasthan\n\n` +
    `📄 *Receipt #${receipt.no}*\n` +
    `📅 ${formatDate(receipt.date)} | ⏰ ${formatTime(receipt.time)}\n\n` +
    `👤 *Customer:* ${receipt.name}\n` +
    `📞 *Mobile:* +91 ${receipt.mobile}\n` +
    (receipt.address ? `🏠 *Address:* ${receipt.address}\n` : '') +
    `\n💰 *Amount:* Rs.${Number(receipt.amount).toLocaleString('en-IN')}\n` +
    `💳 *Mode:* ${receipt.mode}\n` +
    `🔖 *Phase:* ${phases}` +
    notes + desc +
    `\n\nThank you for your business! 🙏\n_Rajdeep Furnitures_`;

  const url = `https://wa.me/91${receipt.mobile}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

// ─── TOAST ───
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
